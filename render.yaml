# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect repo frankntaro/biosfix-workshop → New Blueprint → apply this file.
# After deploy: set FRONTEND_ORIGIN on the API to your static site URL (see README).

databases:
  - name: biosfix-db
    plan: free
    databaseName: biosfix_workshop
    user: biosfix

services:
  - type: web
    name: biosfix-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: biosfix-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
      - key: TEXTBEE_API_KEY
        sync: false
      - key: TEXTBEE_DEVICE_ID
        sync: false
      - key: WORKSHOP_PHONE
        sync: false
      - key: TEXTBEE_DEFAULT_COUNTRY_CODE
        value: "255"

  - type: web
    name: biosfix-web
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_PREFIX
        fromService:
          type: web
          name: biosfix-api
          envVarKey: RENDER_EXTERNAL_URL
